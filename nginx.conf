# =============================================================================
#  Radarchat — Production Nginx Configuration
#  Usage: copy to /etc/nginx/sites-available/radarchat
#         symlink: ln -s /etc/nginx/sites-available/radarchat \
#                         /etc/nginx/sites-enabled/radarchat
#
#  Replace every occurrence of:
#    YOUR_DOMAIN     →  e.g. radar.example.com
#    YOUR_VPS_IP     →  e.g. 203.0.113.42  (used in CORS allow list)
#
#  TLS certificates are managed by Certbot / Let's Encrypt.
#  After placing this file run:
#    certbot --nginx -d YOUR_DOMAIN
#
#  API server is assumed to run on localhost:8080
#  Expo web build is assumed to be exported to /var/www/radarchat/web
#    (run `pnpm --filter @workspace/profile-radar exec expo export -p web`
#     and copy the `dist/` output there)
# =============================================================================


# ---------------------------------------------------------------------------
# Rate-limit zones  (shared memory, declared in http context)
# ---------------------------------------------------------------------------
# These are the first line of defence — nginx drops requests before they
# even reach Node.js / Express.
#
# Zone 1 – global per-IP limit (mirrors the Express ipRateLimit of 120/min)
#   2 req/s average with a burst of 20 covers normal browsing; spikes above
#   that are either delayed (nodelay removed) or rejected with 429.
#
# Zone 2 – tighter limit on the message endpoint (mirrors messageRateLimit)
#   Allows short bursts but enforces 10/min sustained.
#
# Zone 3 – tightest limit on upload endpoint (photo uploads are expensive)
#
# Zone 4 – limit on admin routes

limit_req_zone  $binary_remote_addr  zone=global:10m    rate=2r/s;
limit_req_zone  $binary_remote_addr  zone=messages:10m  rate=1r/6s;
limit_req_zone  $binary_remote_addr  zone=upload:10m    rate=1r/10s;
limit_req_zone  $binary_remote_addr  zone=admin:10m     rate=5r/m;

# Connection limit — max simultaneous connections per IP
limit_conn_zone $binary_remote_addr  zone=perip:10m;

# Default rate-limit response code
limit_req_status  429;
limit_conn_status 429;


# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name YOUR_DOMAIN;

    # Let Certbot ACME challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# ---------------------------------------------------------------------------
# Main HTTPS server
# ---------------------------------------------------------------------------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name YOUR_DOMAIN;

    # -------------------------------------------------------------------------
    # TLS — filled in by Certbot; shown here for reference
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Modern cipher selection — A+ on SSL Labs
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS — tell browsers to only use HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------------------------------------------------------------------------
    # Global security headers (supplement what Express already sends)
    # -------------------------------------------------------------------------
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-Frame-Options          "DENY"                          always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(self), camera=(self), microphone=()" always;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    # -------------------------------------------------------------------------
    # Connection & request limits
    # -------------------------------------------------------------------------
    limit_conn perip 30;           # max 30 simultaneous connections per IP

    client_max_body_size     10m;  # slightly above the 9mb Express limit so
                                   # nginx doesn't reject before Express can log
    client_body_timeout      15s;
    client_header_timeout    10s;
    keepalive_timeout        65s;
    send_timeout             15s;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/javascript
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Access / error logs
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/radarchat.access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/radarchat.error.log  warn;


    # =========================================================================
    # Route blocks
    # =========================================================================

    # -------------------------------------------------------------------------
    # 1.  WebSocket upgrade — MUST come before the general /api block
    #     Endpoint: wss://YOUR_DOMAIN/api/ws?token=<uuid>
    # -------------------------------------------------------------------------
    location = /api/ws {
        # Apply the global per-IP rate limit (websocket handshakes, not messages)
        limit_req zone=global burst=5 nodelay;

        proxy_pass             http://127.0.0.1:8080;

        # WebSocket upgrade headers
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";

        # Forwarded-for / host headers so Express sees the real client
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive; the app pings every 25s so
        # set the read timeout comfortably above that
        proxy_read_timeout     90s;
        proxy_send_timeout     90s;

        # No buffering for real-time connections
        proxy_buffering        off;
    }

    # -------------------------------------------------------------------------
    # 2.  Photo upload endpoint — large body, strict rate limit
    #     POST /api/upload
    # -------------------------------------------------------------------------
    location = /api/upload {
        limit_req zone=upload burst=3 nodelay;

        # Enforce upload size at nginx level too
        client_max_body_size 10m;

        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        # Allow longer timeout for the R2 upload roundtrip
        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;
    }

    # -------------------------------------------------------------------------
    # 3.  Message endpoint — tight rate limit matching Express messageRateLimit
    #     POST /api/messages
    # -------------------------------------------------------------------------
    location = /api/messages {
        # ~10/min sustained; burst allows a small flurry before throttling
        limit_req zone=messages burst=5 nodelay;

        # Only POST is expected here; reject everything else early
        if ($request_method !~ ^(POST|OPTIONS)$) {
            return 405;
        }

        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     10s;
    }

    # -------------------------------------------------------------------------
    # 4.  Admin routes — extremely tight, no burst, IP-lock recommended
    #     POST /api/admin/shadow-ban/:userId
    #     GET  /api/admin/users
    #
    #     Uncomment the allow/deny lines and replace with your office/VPN IP
    #     for an extra layer of protection beyond ADMIN_SECRET.
    # -------------------------------------------------------------------------
    location ^~ /api/admin/ {
        limit_req zone=admin burst=2 nodelay;

        # Optional: IP allowlist for admin routes
        # allow  YOUR_OFFICE_IP;
        # deny   all;

        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     15s;
    }

    # -------------------------------------------------------------------------
    # 5.  Health check — no rate limit, used by load balancers / uptime monitors
    #     GET /api/healthz
    # -------------------------------------------------------------------------
    location = /api/healthz {
        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        access_log             off;
    }

    # -------------------------------------------------------------------------
    # 6.  All other /api routes — general per-IP rate limit
    # -------------------------------------------------------------------------
    location ^~ /api/ {
        limit_req zone=global burst=20 nodelay;

        proxy_pass             http://127.0.0.1:8080;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_connect_timeout  5s;
        proxy_send_timeout     15s;

        # Buffer settings — fine for JSON responses
        proxy_buffers          8 16k;
        proxy_buffer_size      32k;
    }

    # -------------------------------------------------------------------------
    # 7.  Expo web build — served as static files
    #     Build with: pnpm --filter @workspace/profile-radar exec expo export -p web
    #     Copy dist/ to: /var/www/radarchat/web
    # -------------------------------------------------------------------------
    location / {
        root  /var/www/radarchat/web;
        index index.html;

        # SPA fallback — let Expo Router handle client-side navigation
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively; HTML must always be fresh
        location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|webp|gif|ico)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }

        location = /index.html {
            expires   -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # -------------------------------------------------------------------------
    # 8.  Block common attack paths
    # -------------------------------------------------------------------------

    # Block access to hidden files and directories (.git, .env, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common scanner/exploit paths
    location ~* ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|\.php|cgi-bin) {
        return 404;
        access_log off;
        log_not_found off;
    }
}
